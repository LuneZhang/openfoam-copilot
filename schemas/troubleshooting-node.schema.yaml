type: TroubleshootingNode
required:
  - id
  - symptom
  - probable_causes
  - first_checks
  - likely_fixes
  - source_refs
properties:
  id:
    type: string
  symptom:
    type: string
  probable_causes:
    type: list[string]
  first_checks:
    type: list[string]
  deeper_checks:
    type: list[string]
  likely_fixes:
    type: list[string]
  escalation_path:
    type: list[string]
  source_refs:
    type: list[string]
  confidence:
    type: enum
    values: [high, medium, low]
  notes:
    type: list[string]
